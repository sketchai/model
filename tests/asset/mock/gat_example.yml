
logger:
  save_dir : 'tests/asset/output'
  name : 'gat_logs'

train_data: # Train data related parameters
  num_workers: 1
  path_data: "tests/asset/dataset/mini_example/mini_final.npy" # "sg_t16_validation_final.npy"  #folder or file name (should end with .npy)
  path_weights: "tests/asset/dataset/mini_example/mini_weights.npy"  # "sg_t16_validation_weights.npy" # 


val_data: # Test data related parameters
    num_workers: 1
    num_batch_eval: 20
    path_data: "tests/asset/dataset/mini_example/mini_final.npy"
    path_weights: "tests/asset/dataset/mini_example/mini_weights.npy"
    coef_neg: 1.

train:
    cpu: False
    prep_parms_path: "tests/asset/dataset/mini_example/preprocessing_params.pkl" #"preprocessing_params.pkl" # 
    batch_size: 8
    prop_max_edges_given: 0.1

optimizer:
    lr: !!float 5e-4
    scheduler_step: 2

model: # Architecture and model
    n_head: 4
    num_layers: 2
    embedding_dim : 240
    positional_encoding: True
